<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SockShop - Boutique</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">SockShop 🧦</div>
        <div class="links">
            <a href="index.html" class="active">Boutique</a>
            <a href="references.html">Nos Références</a>
            <a href="bio.html">Notre Histoire</a>
        </div>
    </nav>

    <header>
        <h1>Trouvez la chaussette parfaite !</h1>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Rechercher des chaussettes...">
        </div>
    </header>

    <main>
        <aside class="filters">
            <h3>Filtres</h3>
            <label>Couleur:</label>
            <select id="colorFilter">
                <option value="toutes">Toutes</option>
                <option value="rouge">Rouge</option>
                <option value="bleu">Bleu</option>
                <option value="noir">Noir</option>
                <option value="blanc">Blanc</option>
                <option value="rayé">Rayé</option>
            </select>

            <label>Taille:</label>
            <select id="sizeFilter">
                <option value="toutes">Toutes</option>
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
                <option value="XXL">XXL</option>
            </select>

            <label>Hauteur:</label>
            <select id="heightFilter">
                <option value="toutes">Toutes</option>
                <option value="haute">Hautes</option>
                <option value="basse">Basses</option>
            </select>

            <label>Trier par Prix:</label>
            <select id="priceSort">
                <option value="aucun">Aucun</option>
                <option value="asc">Croissant (- cher au + cher)</option>
                <option value="desc">Décroissant (+ cher au - cher)</option>
            </select>
        </aside>

        <section class="shop-content">
            <h2>🔥 Nos Top Ventes</h2>
            <div id="topSalesGrid" class="grid"></div>

            <h2>Toute la collection</h2>
            <div id="productsGrid" class="grid"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
