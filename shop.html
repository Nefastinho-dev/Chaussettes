<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SockShop - Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-transition">
    <nav>
        <div class="logo">SockShop 🧦</div>
        <div class="links">
            <a href="index.html">L'Univers</a>
            <a href="shop.html" class="active">Collection</a>
            <a href="references.html">Guide Styles</a>
        </div>
    </nav>

    <header style="text-align: center; padding: 4rem 1rem;">
        <h1 style="font-family: var(--font-heading); color: var(--accent-cyan); text-shadow: var(--glow-cyan);">La Constellation</h1>
        <div style="margin-top: 2rem;">
            <input type="text" id="searchInput" placeholder="🔍 Rechercher une aura..." style="background: var(--bg-panel); border: var(--border); color: white; padding: 1rem 2rem; border-radius: 30px; width: 100%; max-width: 500px;">
        </div>
    </header>

    <main class="shop-layout">
        <aside class="filters glass-panel">
            <div class="filter-group">
                <label>Vibe (Couleur)</label>
                <div class="filter-chips" id="colorChips">
                    <button class="chip active" data-value="toutes">Toutes</button>
                    <button class="chip" data-value="rouge">Rouge</button>
                    <button class="chip" data-value="bleu">Bleu</button>
                    <button class="chip" data-value="noir">Noir</button>
                    <button class="chip" data-value="blanc">Blanc</button>
                    <button class="chip" data-value="rayé">Zèbre</button>
                </div>
            </div>

            <div class="filter-group">
                <label>Calibre (Taille)</label>
                <div class="filter-chips" id="sizeChips">
                    <button class="chip active" data-value="toutes">Toutes</button>
                    <button class="chip" data-value="S">S</button>
                    <button class="chip" data-value="M">M</button>
                    <button class="chip" data-value="L">L</button>
                    <button class="chip" data-value="XL">XL</button>
                </div>
            </div>

            <div class="filter-group">
                <label>Tri Valeur</label>
                <div class="filter-chips" id="priceChips">
                    <button class="chip active" data-value="aucun">Auto</button>
                    <button class="chip" data-value="asc">▲ Prix</button>
                    <button class="chip" data-value="desc">▼ Prix</button>
                </div>
            </div>
        </aside>

        <section style="flex: 1;">
            <h2 style="margin-bottom: 2rem; font-family: var(--font-heading); font-size: 1rem;">🔥 Pulsars (Top Ventes)</h2>
            <div id="topSalesGrid" class="grid"></div>
            
            <h2 style="margin: 4rem 0 2rem; font-family: var(--font-heading); font-size: 1rem;">✨ Toute la Collection</h2>
            <div id="productsGrid" class="grid"></div>
        </section>
    </main>

    <div id="productModal" class="modal">
        <div class="modal-content glass-panel">
            <span class="close-btn">&times;</span>
            <div id="modalDetails"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
